services:
  marker-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marker-web
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ngrok:
    image: ngrok/ngrok:latest
    container_name: marker-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "marker-web:8000"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - marker-web
